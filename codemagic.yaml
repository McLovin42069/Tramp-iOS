workflows:
  tramp-ios-build:
    name: Build Tramp iOS
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      xcode: latest
      cocoapods: default
      ios_signing:
        provisioning_profiles:
          - Tramp music player
        certificates:
          - Tramp music player
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "*"
          include: true
          source: true
    scripts:
      - name: Install XcodeGen
        script: |
          echo "Installing XcodeGen..."
          brew install xcodegen
      
      - name: Generate Xcode Project
        script: |
          echo "Generating Tramp.xcodeproj from project.yml..."
          xcodegen generate
          echo "Project generated:"
          ls -la Tramp.xcodeproj/
      
      - name: Build Signed iOS App (Archive + IPA)
        script: |
          echo "Archiving Tramp for iOS..."
          xcodebuild \
            -project Tramp.xcodeproj \
            -scheme Tramp \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -archivePath build/ios/Tramp.xcarchive \
            DEVELOPMENT_TEAM=3GSSABCN8K \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="Tramp Ad Hoc" \
            archive
          
          echo "Exporting IPA..."
          xcodebuild \
            -exportArchive \
            -archivePath build/ios/Tramp.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ExportOptions.plist
          
          echo "Build artifacts:"
          ls -la build/ios/ipa/
      
      - name: Show Build Products
        script: |
          echo "Searching for generated artifacts..."
          find build/ios -name "*.ipa" -o -name "*.app" 2>/dev/null || true
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/**/*.dSYM
